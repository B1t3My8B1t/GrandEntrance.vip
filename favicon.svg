<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#080808"/>
  
  <!-- Outer gold border frame -->
  <rect x="2" y="2" width="28" height="28" stroke="#c9a84c" stroke-width="0.5" fill="none" opacity="0.4"/>
  
  <!-- Corner marks -->
  <rect x="2" y="2" width="3" height="0.8" fill="#c9a84c" opacity="0.8"/>
  <rect x="2" y="2" width="0.8" height="3" fill="#c9a84c" opacity="0.8"/>
  <rect x="27" y="2" width="3" height="0.8" fill="#c9a84c" opacity="0.8"/>
  <rect x="29.2" y="2" width="0.8" height="3" fill="#c9a84c" opacity="0.8"/>
  <rect x="2" y="29.2" width="3" height="0.8" fill="#c9a84c" opacity="0.8"/>
  <rect x="2" y="27" width="0.8" height="3" fill="#c9a84c" opacity="0.8"/>
  <rect x="27" y="29.2" width="3" height="0.8" fill="#c9a84c" opacity="0.8"/>
  <rect x="29.2" y="27" width="0.8" height="3" fill="#c9a84c" opacity="0.8"/>

  <!-- Central diamond gem -->
  <polygon points="16,7 21,13 16,25 11,13" fill="#c9a84c" opacity="0.15"/>
  <polygon points="16,7 21,13 16,25 11,13" stroke="#c9a84c" stroke-width="0.6" fill="none"/>
  
  <!-- Diamond facets -->
  <line x1="11" y1="13" x2="21" y2="13" stroke="#c9a84c" stroke-width="0.5" opacity="0.6"/>
  <line x1="16" y1="7" x2="11" y2="13" stroke="#e8cc7a" stroke-width="0.5" opacity="0.9"/>
  <line x1="16" y1="7" x2="21" y2="13" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>
  <line x1="16" y1="7" x2="16" y2="13" stroke="#e8cc7a" stroke-width="0.4" opacity="0.7"/>

  <!-- Top sparkle -->
  <line x1="16" y1="4" x2="16" y2="5.5" stroke="#e8cc7a" stroke-width="0.6" opacity="0.8"/>
  <line x1="13.5" y1="4.8" x2="14.5" y2="5.8" stroke="#e8cc7a" stroke-width="0.5" opacity="0.6"/>
  <line x1="18.5" y1="4.8" x2="17.5" y2="5.8" stroke="#e8cc7a" stroke-width="0.5" opacity="0.6"/>
</svg>
