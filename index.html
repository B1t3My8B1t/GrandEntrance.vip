<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>grandentrance.vip — Coming Soon</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Tenor+Sans&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8cc7a;
      --cream: #f5f0e8;
      --dark: #080808;
      --velvet: #1a0a0a;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--cream);
      font-family: 'Tenor Sans', sans-serif;
      overflow: hidden;
    }

    /* Noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    /* Radial spotlight */
    .spotlight {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Animated curtain lines */
    .curtain-left, .curtain-right {
      position: fixed;
      top: 0;
      width: 1px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      opacity: 0.2;
      z-index: 1;
    }
    .curtain-left { left: 20px; animation: curtainPulse 4s ease-in-out infinite; }
    .curtain-right { right: 20px; animation: curtainPulse 4s ease-in-out infinite 2s; }

    @keyframes curtainPulse {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.25; }
    }

    /* Top & bottom gold lines */
    .line-top, .line-bottom {
      position: fixed;
      left: 20px;
      right: 20px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      opacity: 0.3;
      z-index: 1;
    }
    .line-top { top: 18px; }
    .line-bottom { bottom: 18px; }

    /* Main stage */
    .stage {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 60px 40px;
      text-align: center;
    }

    /* Rope divider */
    .rope {
      width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 28px auto;
      position: relative;
      animation: fadeUp 1s ease both;
      animation-delay: 0.2s;
      opacity: 0;
    }
    .rope::before, .rope::after {
      content: '◆';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 6px;
    }
    .rope::before { left: -10px; }
    .rope::after { right: -10px; }

    /* Badge */
    .badge {
      font-family: 'Tenor Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      animation: fadeUp 1s ease both;
      animation-delay: 0.4s;
    }

    /* Main title */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(64px, 18vw, 110px);
      line-height: 0.9;
      letter-spacing: -0.01em;
      color: var(--cream);
      opacity: 0;
      animation: fadeUp 1.2s ease both;
      animation-delay: 0.6s;
    }
    h1 em {
      font-style: italic;
      color: var(--gold-light);
    }

    /* Subtitle */
    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(15px, 4vw, 20px);
      color: rgba(245,240,232,0.45);
      letter-spacing: 0.05em;
      margin-top: 16px;
      opacity: 0;
      animation: fadeUp 1s ease both;
      animation-delay: 0.9s;
      max-width: 280px;
      line-height: 1.5;
    }

    /* Status pill */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 36px;
      padding: 12px 28px;
      border: 1px solid rgba(201,168,76,0.25);
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.5);
      opacity: 0;
      animation: fadeUp 1s ease both;
      animation-delay: 1.1s;
      white-space: nowrap;
    }
    .dot {
      width: 6px;
      height: 6px;
      flex-shrink: 0;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* Domain stamp */
    .domain {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.3);
      z-index: 10;
      white-space: nowrap;
      opacity: 0;
      animation: fadeUp 1s ease both;
      animation-delay: 1.4s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 1px;
      height: 1px;
      background: var(--gold);
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0;
    }
    @keyframes float {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="spotlight"></div>
  <div class="curtain-left"></div>
  <div class="curtain-right"></div>
  <div class="line-top"></div>
  <div class="line-bottom"></div>

  <div class="particles" id="particles"></div>

  <main class="stage">
    <div class="badge">Preparing for arrival</div>
    <div class="rope"></div>
    <h1>Grand<br/><em>Entrance</em></h1>
    <p class="subtitle">Something extraordinary is being prepared.</p>
    <div class="status">
      <span class="dot"></span>
      Under Construction
    </div>
  </main>

  <div class="domain">grandentrance.vip</div>

  <script>
    // Generate floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.width = p.style.height = (Math.random() * 2 + 1) + 'px';
      p.style.animationDuration = (Math.random() * 15 + 10) + 's';
      p.style.animationDelay = (Math.random() * 15) + 's';
      container.appendChild(p);
    }
  </script>

</body>
</html>
